name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: tests (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [py311, py312, py313]

    steps:
      - uses: actions/checkout@v6

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: latest
          cache: true
          environments: ${{ matrix.env }}

      - name: Run unit tests
        run: pixi run --environment ${{ matrix.env }} tests

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: matrix.env == 'py312'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: latest
          cache: true

      - name: Run ruff check
        run: pixi run run-ruff-check

      - name: Run ruff format check
        run: pixi run ruff format --check .
