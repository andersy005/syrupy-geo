name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: tests (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [py312, py313, py314]

    steps:
      - uses: actions/checkout@v7

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: latest
          cache: true
          environments: ${{ matrix.env }}

      - name: Run unit tests
        run: pixi run --environment ${{ matrix.env }} tests

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        if: matrix.env == 'py313'
        with:
          files: coverage.xml
          fail_ci_if_error: false
